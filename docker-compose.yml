services:
  # Serviço do Banco de Dados Relacional
  db:
    image: postgres:15-alpine
    container_name: planejamento_db_container
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=planejamento_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Serviço da Aplicação Django
  web:
    build: .
    container_name: planejamento_web_container
    volumes:
      - ./code:/app
    ports:
      - "8000:8000"
    environment:
      - DEBUG=True
      - SQL_ENGINE=postgres
      - SQL_DATABASE=planejamento_db
      - SQL_USER=postgres
      - SQL_PASSWORD=postgres
      - SQL_HOST=db
      - SQL_PORT=5432
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data: